<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clubs par Saison - FI-ADEKASH Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* Votre CSS existant - inchangé */
        .clubs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .clubs-header h1 {
            font-size: 20px;
            color: #1a202c;
            margin: 0;
        }

        .filters-container {
            background: #f7fafc;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 160px;
        }

        .filter-group label {
            font-weight: 600;
            color: #2d3748;
            font-size: 11px;
        }

        .filter-group select {
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            background: white;
        }

        .btn-reset {
            background: #a0aec0;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
            transition: all 0.2s ease;
            height: 34px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-reset:hover {
            background: #718096;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
        }

        #clubsTable {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        #clubsTable thead th {
            background: #f8fafc;
            padding: 8px 6px;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #475569;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        #clubsTable tbody td {
            padding: 6px 6px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .club-row:hover {
            background-color: #f8fafc;
        }

        .cell-text {
            font-size: 11px;
            color: #334155;
            line-height: 1.3;
        }

        .club-name {
            font-weight: 500;
            color: #1e293b;
        }

        .row-number {
            font-size: 11px;
            color: #64748b;
            font-weight: 500;
            display: inline-block;
            min-width: 28px;
            text-align: center;
        }

        .badge-grade {
            display: inline-block;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: 600;
            border-radius: 10px;
            text-align: center;
            white-space: nowrap;
            background: #e9d8fd;
            color: #6b46c0;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            padding: 12px;
        }

        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .page-btn {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
            color: #475569;
        }

        .page-btn:hover:not(:disabled) {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 11px;
            color: #64748b;
            margin: 0 6px;
        }

        .page-count {
            font-size: 11px;
            color: #94a3b8;
            margin-left: 4px;
        }

        .total-count {
            font-size: 11px;
            color: #64748b;
            margin-top: 12px;
            text-align: right;
        }

        .loader {
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 12px;
        }

        .empty-row td {
            text-align: center;
            padding: 25px;
            color: #a0aec0;
            font-size: 12px;
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">Clubs par Saison</div>
                <div class="topbar-user">
                    <div class="avatar" id="userAvatar">AD</div>
                    <span id="userName">Administrateur</span>
                </div>
            </div>

            <div class="content">
                <div class="clubs-header">
                    <h1><i class="fas fa-calendar-alt"></i> Clubs par Saison</h1>
                </div>

                <!-- Filtres : Saison et Secteur -->
                <div class="filters-container">
                    <div class="filter-group">
                        <label><i class="fas fa-calendar"></i> Saison</label>
                        <select id="saisonSelect">
                            <option value="">Toutes les saisons</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-building"></i> Secteur</label>
                        <select id="secteurSelect">
                            <option value="">Tous les secteurs</option>
                        </select>
                    </div>
                    <button class="btn-reset" onclick="resetFilters()">
                        <i class="fas fa-undo-alt"></i> Réinitialiser
                    </button>
                </div>

                <!-- Tableau des clubs -->
                <div class="table-container">
                    <table id="clubsTable">
                        <thead>
                            <tr>
                                <th>N°</th>
                                <th>Secteur</th>
                                <th>Nom du Club</th>
                                <th>Numéro du club</th>
                                <th>Représentant</th>
                                <th>Grade</th>
                                <th>Contact</th>
                                <th>Date inscription</th>
                            </tr>
                        </thead>
                        <tbody id="clubsTableBody">
                            <tr class="loader">
                                <td colspan="8"><i class="fas fa-spinner"></i> Chargement des clubs...<\ /td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination"></div>
                <div class="total-count" id="totalCount"></div>
            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
    <script src="js/clubs-saison.js"></script>

</body>

</html>
