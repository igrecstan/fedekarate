<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nos Clubs Affiliés - FI-ADEKASH</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .clubs-page-header {
            background: linear-gradient(135deg, #10131f 0%, #1e2a3a 100%);
            color: white;
            padding: 3rem 0;
            text-align: center;
        }
        .clubs-page-header h2 {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            margin-bottom: 0.5rem;
        }
        
        /* Saison Slider */
        .seasons-slider-wrapper {
            position: relative;
            margin: 100px auto; /* Plus d'espace vertical pour centrer dans la page */
            max-width: 1200px;
            padding: 0 50px;
            display: flex;
            align-items: center;
        }
        .seasons-slider {
            display: flex;
            gap: 30px;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding: 20px 5px;
            width: 100%;
        }
        .season-card {
            min-width: calc(25% - 23px);
            background: #E8650A; /* Orange */
            color: white;
            border-radius: 20px;
            padding: 40px 20px; /* Plus de padding */
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(232, 101, 10, 0.25);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 200px;
        }
        .season-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(232, 101, 10, 0.4);
        }
        .season-card .label {
            font-size: 0.9rem;
            text-transform: uppercase;
            opacity: 0.8;
            font-weight: 500;
            margin: 5px 0;
        }
        .season-card .value {
            font-size: 2.8rem; /* Très grand pour l'année et le nombre */
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: -1px;
        }
        .season-card h4 { display: none; } /* On n'utilise plus h4 directement */
        
        .slider-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 10;
            color: #E8650A;
            border: none;
        }
        .slider-nav:hover {
            background: #E8650A;
            color: white;
        }
        .slider-nav.prev { left: 0; }
        .slider-nav.next { right: 0; }

        .secteur-title {
            background: #f0fce8;
            color: #2aa600;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            margin: 2rem 0 1.5rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            border-left: 5px solid #d69213;
        }
        .club-card-public {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.3s;
        }
        .club-card-public:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .club-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e2a3a;
            margin-bottom: 0.5rem;
        }
        .club-id {
            font-size: 0.8rem;
            color: #d69213;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            display: block;
        }
        .club-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #4a5568;
        }
        .club-detail i {
            color: #2aa600;
            width: 20px;
        }
        .badge-grade {
            display: inline-block;
            background: #e9d8fd;
            color: #6b46c0;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        #clubs-container {
            padding-bottom: 5rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #666;
        }
        
        @media (max-width: 992px) {
            .season-card { min-width: calc(33.33% - 14px); }
        }
        @media (max-width: 768px) {
            .season-card { min-width: calc(50% - 10px); }
            .clubs-page-header h2 { font-size: 2rem; }
        }
        @media (max-width: 480px) {
            .season-card { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div id="site-header"></div>

    <header class="clubs-page-header">
        <div class="container">
            <h2>Nos Clubs Affiliés</h2>
            <p>Retrouvez la liste de tous les clubs membres de la FI-ADEKASH par saison.</p>
        </div>
    </header>

    <div class="seasons-slider-wrapper container">
        <button class="slider-nav prev" id="prevSeason"><i class="fas fa-chevron-left"></i></button>
        <div class="seasons-slider" id="seasonsSlider">
            <!-- Les cartes de saison seront injectées ici -->
        </div>
        <button class="slider-nav next" id="nextSeason"><i class="fas fa-chevron-right"></i></button>
    </div>

    <main class="container" id="clubs-container">
        <!-- Contenu simplifié : uniquement le slider au-dessus -->
    </main>

    <div id="site-footer"></div>

    <script src="js/layout.js"></script>
    <script>
        let allSeasons = [];

        async function loadSeasons() {
            try {
                const response = await fetch('/api/seasons-summary');
                const data = await response.json();
                if (data.success) {
                    allSeasons = data.seasons;
                    renderSeasons();
                }
            } catch (e) {
                console.error('Erreur saisons:', e);
            }
        }

        function renderSeasons() {
            const slider = document.getElementById('seasonsSlider');
            slider.innerHTML = '';
            allSeasons.forEach(s => {
                const card = document.createElement('div');
                card.className = 'season-card';
                
                // Extraire l'année du libellé (ex: "SAISON 2026" -> "2026")
                const year = String(s.libelle_saison).replace('SAISON', '').trim();
                
                card.innerHTML = `
                    <div class="label">Saison</div>
                    <div class="value">${year}</div>
                    <div class="label">Clubs affiliés</div>
                    <div class="value">${s.club_count}</div>
                `;
                slider.appendChild(card);
            });
        }

        // Navigation Slider
        document.getElementById('nextSeason').onclick = () => {
            const slider = document.getElementById('seasonsSlider');
            slider.scrollLeft += slider.offsetWidth / 2;
        };
        document.getElementById('prevSeason').onclick = () => {
            const slider = document.getElementById('seasonsSlider');
            slider.scrollLeft -= slider.offsetWidth / 2;
        };

        document.addEventListener('DOMContentLoaded', loadSeasons);
    </script>
</body>
</html>
